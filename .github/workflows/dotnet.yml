name: Deploy production

on:
  push:
    branches:
      - master

permissions:
  packages: write
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Convert repository name to lowercase
        run: |
          echo "IMAGE_NAME_LC=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile -t $IMAGE_NAME_LC:latest .
          docker push $IMAGE_NAME_LC:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Convert repository name to lowercase
        run: |
          echo "IMAGE_NAME_LC=$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: 204.168.214.142
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "Conexión exitosa al VPS"

            docker login ghcr.io -u "andrescortesdev" -p ${{ secrets.TOKEN }}

            docker pull $IMAGE_NAME_LC:latest

            docker stop ${{ github.event.repository.name }} || true
            docker rm ${{ github.event.repository.name }} || true

            docker run -d \
              --name ${{ github.event.repository.name }} \
              -p 8080:8080 \
              $IMAGE_NAME_LC:latest
